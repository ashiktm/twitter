<div class="min-h-screen flex items-center justify-center bg-white py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-md w-full space-y-8">
    <div class="flex flex-col items-center">
      <!-- Twitter Logo -->
      <svg viewBox="0 0 24 24" aria-hidden="true" class="w-12 h-12 text-gray-900 fill-current mb-6">
        <g>
          <path
            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.008 5.961h-1.05z">
          </path>
        </g>
      </svg>
      <h2 class="text-center text-3xl font-bold text-gray-900 tracking-tight">
        Sign in to X
      </h2>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="login" (ngSubmit)="submit()">
      <div class="space-y-4">
        <div class="relative">
          <input type="email" formControlName="email"
            class="peer w-full px-4 pt-6 pb-2 border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-transparent"
            placeholder="Email address" />
          <label
            class="absolute left-4 top-2 text-xs text-gray-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:top-2 peer-focus:text-xs peer-focus:text-blue-500 pointer-events-none">
            Email address
          </label>
        </div>
        <div class="relative">
          <input type="password" formControlName="password"
            class="peer w-full px-4 pt-6 pb-2 border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-transparent"
            placeholder="Password" />
          <label
            class="absolute left-4 top-2 text-xs text-gray-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:top-2 peer-focus:text-xs peer-focus:text-blue-500 pointer-events-none">
            Password
          </label>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input name="remember_me" type="checkbox"
            class="h-4 w-4 text-blue-500 focus:ring-blue-500 border-gray-300 rounded cursor-pointer" />
          <label for="remember_me" class="ml-2 block text-sm text-gray-900 cursor-pointer">
            Remember me
          </label>
        </div>
      </div>

      <div class="pt-2">
        <button type="submit"
          class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-full shadow-sm text-base font-bold text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-colors">
          Next
        </button>
        <button type="button"
          class="mt-4 w-full flex justify-center py-3.5 px-4 border border-gray-300 rounded-full shadow-sm text-base font-bold text-gray-900 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-colors">
          Forgot password?
        </button>
      </div>
    </form>

    <div class="mt-8 text-center pb-8">
      <p class="text-[15px] text-gray-500">
        Don't have an account?
        <a [routerLink]="['/signup']" class="font-medium text-blue-500 hover:underline">
          Sign up
        </a>
      </p>
    </div>
  </div>
</div>

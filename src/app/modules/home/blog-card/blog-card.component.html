<article
  class="p-4 border-b border-gray-200 hover:bg-gray-50 transition-colors duration-200 cursor-pointer text-[15px] font-sans">
  <div class="flex space-x-3">
    <!-- Avatar -->
    <div class="flex-shrink-0">
      <img src="assets/dummy.jpg" alt="User Avatar"
        class="w-10 h-10 rounded-full cursor-pointer hover:opacity-90 transition-opacity">
    </div>

    <!-- Main Content -->
    <div class="flex-1 min-w-0">
      <!-- Header -->
      <div class="flex items-center space-x-1">
        <span class="font-bold text-gray-900 hover:underline cursor-pointer truncate">{{ tweet.createdby?.username ||
          'Unknown' }}</span>
        <span class="text-gray-500 truncate">@{{ tweet.createdby?.username || 'unknown' }}</span>
        <span class="text-gray-500">·</span>
        <span class="text-gray-500 hover:underline cursor-pointer">1h</span>
      </div>

      <!-- Tweet Body -->
      <div class="mt-1 text-gray-900 leading-snug break-words whitespace-pre-wrap">{{ tweet.content }}</div>

      <!-- Action Buttons -->
      <div class="flex justify-between items-center mt-3 text-gray-500 max-w-md">
        <!-- Reply Button -->
        <div class="flex items-center group cursor-pointer"
          (click)="$event.stopPropagation(); showComments = !showComments">
          <div class="p-2 -ml-2 rounded-full group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
            <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
          </div>
          <span class="ml-1 text-[13px] group-hover:text-blue-500 transition-colors">{{ tweet.comments?.length || 0
            }}</span>
        </div>

        <!-- Retweet Button (Visual Only) -->
        <div class="flex items-center group cursor-pointer" (click)="$event.stopPropagation()">
          <div class="p-2 rounded-full group-hover:bg-green-50 group-hover:text-green-500 transition-colors">
            <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </div>
          <span class="ml-1 text-[13px] group-hover:text-green-500 transition-colors">0</span>
        </div>

        <!-- Like Button -->
        <div class="flex items-center group cursor-pointer"
          (click)="$event.stopPropagation(); toggleLike(tweet._id, 'Tweet')">
          <div class="p-2 rounded-full group-hover:bg-pink-50 group-hover:text-pink-600 transition-colors">
            <!-- Normal heart icon -->
            <svg class="w-[18px] h-[18px] group-active:scale-95 transition-transform" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
          </div>
          <span class="ml-1 text-[13px] group-hover:text-pink-600 transition-colors">{{ tweet.likes?.length || 0
            }}</span>
        </div>

        <!-- Share Button (Visual Only) -->
        <div class="flex items-center group cursor-pointer" (click)="$event.stopPropagation()">
          <div class="p-2 rounded-full group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
            <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Comments Section -->
      <div *ngIf="showComments" class="mt-4" (click)="$event.stopPropagation()">
        <!-- Existing comments -->
        <div class="border-t border-gray-100 pt-3" *ngIf="tweet.comments && tweet.comments.length > 0">
          <div #commentsContainer class="space-y-4 max-h-64 overflow-y-auto pr-2">
            <div *ngFor="let comment of tweet.comments" class="flex items-start space-x-3">
              <img src="assets/dummy.jpg" alt="Commenter Avatar"
                class="w-8 h-8 rounded-full cursor-pointer hover:opacity-90 flex-shrink-0" />
              <div class="flex-1 min-w-0">
                <div class="flex items-center space-x-1">
                  <span class="font-bold text-gray-900 hover:underline cursor-pointer text-[14px] truncate">{{
                    comment.user?.username || 'Unknown' }}</span>
                  <span class="text-gray-500 text-[14px] truncate">@{{ comment.user?.username || 'unknown' }}</span>
                </div>
                <p class="text-gray-900 text-[14px] mt-0.5 break-words">{{ comment.content }}</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Add comment component -->
        <app-comment [tweetId]="tweet._id" (newCommentEvent)="createComment($event)"
          class="mt-3 block border-t border-gray-100 pt-3"></app-comment>
      </div>
    </div>
  </div>
</article>

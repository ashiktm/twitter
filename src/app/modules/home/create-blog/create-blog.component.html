<div class="px-4 py-3 bg-white border-b border-gray-200">
  <div class="flex space-x-3">
    <!-- Avatar -->
    <div class="flex-shrink-0">
      <img src="assets/dummy.jpg" alt="User Avatar" class="w-10 h-10 rounded-full">
    </div>

    <!-- Input Area -->
    <div class="flex-1 min-w-0">
      <form>
        <div>
          <textarea [formControl]="content" id="content" name="content" rows="3"
            class="w-full text-lg placeholder-gray-500 text-gray-900 bg-transparent border-0 focus:ring-0 resize-none outline-none py-2"
            placeholder="What is happening?!" required></textarea>
        </div>

        <!-- Actions & Submit -->
        <div class="flex items-center justify-between pt-2 border-t border-gray-100 mt-2">
          <div class="flex space-x-2 text-blue-500">
            <!-- Dummy toolbar icons -->
            <button type="button" class="p-2 rounded-full hover:bg-blue-50 transition-colors">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </button>
            <button type="button" class="p-2 rounded-full hover:bg-blue-50 transition-colors">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
              </svg>
            </button>
          </div>

          <button [disabled]="!content.value" (click)="createBlog()"
            class="bg-blue-500 text-white font-bold px-4 py-1.5 rounded-full hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            Post
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

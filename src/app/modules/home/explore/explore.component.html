<main class="max-w-2xl mx-auto border-x border-gray-200 min-h-screen bg-white">
    <!-- Header Sticky with Search Bar -->
    <div class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 py-3 cursor-pointer">
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                        clip-rule="evenodd"></path>
                </svg>
            </div>
            <input type="text" [(ngModel)]="searchTerm" (input)="onSearchChange($event)"
                class="block w-full pl-10 pr-10 py-2 border border-transparent rounded-full leading-5 bg-gray-100 text-gray-900 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors"
                placeholder="Search for tags..." />

            <button *ngIf="searchTerm" (click)="clearSearch()"
                class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                <div class="p-1 rounded-full bg-blue-500 text-white hover:bg-blue-600 transition-colors">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </div>
            </button>

            <!-- Hashtag Autocomplete Dropdown -->
            <div *ngIf="showDropdown && hashtags.length > 0"
                class="absolute w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg z-50 overflow-hidden">
                <ul class="max-h-60 overflow-y-auto">
                    <li *ngFor="let item of hashtags" (click)="selectHashtag(item.text)"
                        class="px-4 py-3 hover:bg-gray-100 cursor-pointer flex items-center justify-between border-b border-gray-100 last:border-0">
                        <div class="flex items-center space-x-2">
                            <div class="p-2 rounded-full bg-gray-100 text-gray-600">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
                                </svg>
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900 text-sm">#{{ item.text }}</h4>
                            </div>
                        </div>
                        <span class="text-xs text-gray-500">{{ item.tweets?.length || 0 }} posts</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="divide-y divide-gray-200">
        <app-blog-card *ngFor="let tweet of tweets" [tweet]="tweet"></app-blog-card>

        <div *ngIf="tweets.length === 0" class="py-8 text-center text-gray-500">
            <h3 class="text-lg font-bold text-gray-900">No results</h3>
            <p>Try searching for a different #tag</p>
        </div>
    </div>
</main>

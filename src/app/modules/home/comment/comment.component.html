<div class="py-2">
  <form class="flex items-center space-x-3">
    <!-- Avatar -->
    <img src="assets/dummy.jpg" alt="Your Avatar" class="w-8 h-8 rounded-full flex-shrink-0" />

    <!-- Input -->
    <div
      class="flex-1 min-w-0 bg-gray-50 rounded-full border border-gray-100 flex items-center px-4 py-1.5 focus-within:ring-1 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
      <input [formControl]="comment" type="text"
        class="w-full bg-transparent border-0 focus:ring-0 text-[15px] outline-none placeholder-gray-500 py-1"
        placeholder="Post your reply" />
    </div>

    <!-- Reply Button -->
    <button (click)="onSubmit()" type="submit" [disabled]="!comment.value"
      class="bg-blue-500 text-white font-bold px-4 py-1.5 rounded-full hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors text-[15px] flex-shrink-0">
      Reply
    </button>
  </form>
</div>
